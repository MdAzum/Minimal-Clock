# Minimal Clock - CI build
# Builds a debug APK on every push to main, and lets you trigger a manual
# build any time from the Actions tab.
name: Build Minimal Clock APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Minimal Clock source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin an explicit, known-compatible Gradle version instead of
          # relying on whatever (if anything) is pre-installed on the
          # runner — this must match AGP 8.5.2's minimum Gradle requirement.
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimal-clock-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
